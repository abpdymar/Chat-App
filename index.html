<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatFlow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--s1:#13131a;--s2:#1c1c26;--s3:#252533;--border:#2a2a3a;--accent:#6c63ff;--green:#25d366;--text:#eeeef5;--muted:#7070a0;--danger:#ff5c5c;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
.screen{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.screen.off{display:none!important;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:440px;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.card-logo{font-size:30px;font-weight:800;background:linear-gradient(135deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.card-sub{color:var(--muted);font-size:13px;margin-bottom:30px;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
.fld input{width:100%;padding:11px 14px;border-radius:11px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border .2s;}
.fld input:focus{border-color:var(--accent);}
.fld input::placeholder{color:var(--muted);}
.fld .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;}
.btn-main{width:100%;padding:12px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.btn-main:hover{opacity:.87;}
.btn-ghost{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:11px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;margin-top:8px;transition:all .2s;}
.btn-ghost:hover{background:var(--s2);color:var(--text);}
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:11px;padding:3px;margin-bottom:22px;}
.tab{flex:1;padding:8px;border:none;border-radius:9px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;color:var(--muted);background:transparent;transition:all .2s;}
.tab.on{background:var(--s2);color:var(--text);}
.msg-box{border-radius:10px;padding:10px 13px;font-size:13px;margin-top:12px;display:none;line-height:1.5;}
.err{background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.3);color:#ff9090;}
.ok{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);color:#25d366;}
#app{display:none;height:100vh;}
.layout{display:flex;height:100vh;}
.sb{width:340px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sb-top{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.sb-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sb-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1;}
.ib{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;transition:all .2s;flex-shrink:0;}
.ib:hover{background:var(--s3);color:var(--text);}
.sb-tabs{display:flex;gap:3px;background:var(--bg);border-radius:10px;padding:3px;}
.sb-tab{flex:1;padding:7px;border:none;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--muted);background:transparent;transition:all .2s;}
.sb-tab.on{background:var(--s2);color:var(--text);}
.sb-search{padding:10px 14px;position:relative;}
.sb-search input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border .2s;}
.sb-search input:focus{border-color:var(--accent);}
.sb-search .si{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.chat-list{flex:1;overflow-y:auto;}
.chat-list::-webkit-scrollbar{width:3px;}
.chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ci{display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.03);}
.ci:hover{background:var(--s2);}
.ci.on{background:rgba(108,99,255,.12);}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.av.sm{width:30px;height:30px;font-size:12px;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:600;margin-bottom:2px;}
.ci-prev{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-time{font-size:11px;color:var(--muted);}
.user-bar{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.un{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ue{font-size:11px;color:var(--muted);}
.btn-lo{padding:5px 11px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-lo:hover{border-color:var(--danger);color:var(--danger);}
.ca{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
.ca-head{padding:13px 20px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.ct{font-size:15px;font-weight:700;}
.cs{font-size:12px;color:var(--muted);}
.msgs{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:3px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{display:flex;max-width:68%;align-items:flex-end;gap:7px;animation:fu .18s ease;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg.them{align-self:flex-start;}
.msg-av{width:27px;height:27px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bub{padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.5;word-break:break-word;}
.msg.me .bub{background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.msg.them .bub{background:var(--s2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-sender{font-size:11px;font-weight:600;color:#a78bfa;margin-bottom:2px;}
.msg-time{font-size:10px;color:var(--muted);margin-top:2px;}
.msg.me .msg-time{text-align:right;}
.date-sep{text-align:center;margin:10px 0;}
.date-sep span{background:var(--s2);border:1px solid var(--border);padding:3px 12px;border-radius:20px;font-size:11px;color:var(--muted);}
.empty-ca{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:40px;}
.empty-ca .big{font-size:70px;margin-bottom:18px;opacity:.3;}
.empty-ca h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
.empty-msgs{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);}
.empty-msgs .bi{font-size:50px;margin-bottom:10px;opacity:.3;}
.inp-bar{padding:13px 16px;border-top:1px solid var(--border);background:var(--s1);display:flex;gap:9px;align-items:flex-end;}
.inp-bar textarea{flex:1;padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:13.5px;outline:none;resize:none;max-height:110px;transition:border .2s;line-height:1.5;}
.inp-bar textarea:focus{border-color:var(--accent);}
.send{width:42px;height:42px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;}
.send:hover{opacity:.85;}
.ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;}
.ov.off{display:none!important;}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:28px;width:420px;box-shadow:0 30px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:18px;}
.modal-acts{display:flex;gap:8px;margin-top:16px;}
.btn-c{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
.btn-c:hover{background:var(--s2);color:var(--text);}
.btn-ok{flex:1;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.user-result{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);margin-bottom:7px;transition:all .15s;}
.user-result:hover{background:var(--s2);border-color:var(--accent);}
.ur-name{font-size:14px;font-weight:600;}
.ur-email{font-size:12px;color:var(--muted);}
.ur-btn{margin-left:auto;padding:5px 12px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.member-chip{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 6px;font-size:12px;margin:3px;}
.member-chip button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0;}
#grp-member-chips{min-height:32px;margin-bottom:10px;flex-wrap:wrap;display:flex;}
.search-empty{text-align:center;color:var(--muted);font-size:13px;padding:16px;line-height:1.7;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.a1{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;}
.a2{background:linear-gradient(135deg,#25d366,#1aad52);color:#fff;}
.a3{background:linear-gradient(135deg,#ff6b6b,#ffa07a);color:#fff;}
.a4{background:linear-gradient(135deg,#4ecdc4,#44b3ab);color:#fff;}
.a5{background:linear-gradient(135deg,#f7b731,#f0932b);color:#fff;}
.a6{background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;}
.a7{background:linear-gradient(135deg,#74b9ff,#0984e3);color:#fff;}
.a8{background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;}
</style>
</head>
<body>

<div class="screen" id="s-config">
  <div class="card">
    <div class="card-logo">ChatFlow</div>
    <div class="card-sub">Schritt 1 — Supabase verbinden</div>
    <div class="fld"><label>Supabase Project URL</label><input id="cfg-url" type="text" placeholder="https://xxxx.supabase.co"/><div class="hint">Settings → API → Project URL</div></div>
    <div class="fld"><label>Anon Public Key</label><input id="cfg-key" type="text" placeholder="eyJhbGci..."/><div class="hint">Settings → API → anon / public</div></div>
    <button class="btn-main" onclick="saveConfig()">Verbinden →</button>
    <div class="msg-box err" id="cfg-err"></div>
    <div class="msg-box ok" id="cfg-ok"></div>
  </div>
</div>

<div class="screen off" id="s-auth">
  <div class="card">
    <div class="card-logo">ChatFlow</div>
    <div class="card-sub">Anmelden oder Registrieren</div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('login')">Anmelden</button>
      <button class="tab" onclick="switchTab('register')">Registrieren</button>
    </div>
    <div id="f-login">
      <div class="fld"><label>E-Mail</label><input type="email" id="l-email" placeholder="mail@example.com"/></div>
      <div class="fld"><label>Passwort</label><input type="password" id="l-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn-main" onclick="doLogin()">Anmelden →</button>
    </div>
    <div id="f-reg" style="display:none">
      <div class="fld"><label>Dein Name</label><input type="text" id="r-name" placeholder="Max Mustermann"/></div>
      <div class="fld"><label>E-Mail</label><input type="email" id="r-email" placeholder="mail@example.com"/></div>
      <div class="fld"><label>Passwort</label><input type="password" id="r-pw" placeholder="min. 6 Zeichen" onkeydown="if(event.key==='Enter')doRegister()"/></div>
      <button class="btn-main" onclick="doRegister()">Registrieren →</button>
    </div>
    <div class="msg-box err" id="auth-err"></div>
    <div class="msg-box ok" id="auth-ok"></div>
    <button class="btn-ghost" onclick="showS('s-config')">← Supabase neu konfigurieren</button>
  </div>
</div>

<div id="app">
 <div class="layout">
  <div class="sb">
    <div class="sb-top">
      <div class="sb-head">
        <span class="sb-logo">ChatFlow</span>
        <div class="ib" onclick="openNewChat()" title="Neuer Chat">✉️</div>
        <div class="ib" onclick="openNewGroup()" title="Neue Gruppe">👥</div>
      </div>
      <div class="sb-tabs">
        <button class="sb-tab on" onclick="sbTab('chats')">Chats</button>
        <button class="sb-tab" onclick="sbTab('groups')">Gruppen</button>
      </div>
    </div>
    <div class="sb-search"><span class="si">🔍</span><input type="text" placeholder="Suchen..." oninput="filterChats(this.value)"/></div>
    <div class="chat-list" id="chat-list"><div style="padding:24px;text-align:center"><div class="spinner"></div></div></div>
    <div class="user-bar">
      <div class="av a1" id="my-av" style="width:36px;height:36px;font-size:13px">?</div>
      <div style="flex:1;min-width:0"><div class="un" id="my-name">—</div><div class="ue" id="my-email">—</div></div>
      <button class="btn-lo" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="ca" id="ca">
    <div class="empty-ca"><div class="big">💬</div><h2>ChatFlow</h2><p>Tippe auf ✉️ um einen Chat zu starten.</p></div>
  </div>
 </div>
</div>

<div class="ov off" id="m-newchat" onclick="if(event.target===this)closeModal('m-newchat')">
  <div class="modal">
    <h3>💬 Neuen Chat starten</h3>
    <div class="fld"><label>Name oder E-Mail</label><input type="text" id="search-user" placeholder="z.B. Max oder max@mail.com" oninput="searchUsers(this.value)" autocomplete="off"/></div>
    <div id="user-results"><div class="search-empty">Tippe einen Namen ein...</div></div>
    <div style="margin-top:12px"><button class="btn-c" style="width:100%" onclick="closeModal('m-newchat')">Schließen</button></div>
  </div>
</div>

<div class="ov off" id="m-newgroup" onclick="if(event.target===this)closeModal('m-newgroup')">
  <div class="modal">
    <h3>👥 Neue Gruppe</h3>
    <div class="fld"><label>Gruppenname</label><input type="text" id="grp-name" placeholder="z.B. Familie, Freunde..."/></div>
    <div class="fld"><label>Mitglieder suchen</label><input type="text" id="grp-search" placeholder="Name oder E-Mail..." oninput="searchForGroup(this.value)" autocomplete="off"/></div>
    <div id="grp-member-chips"></div>
    <div id="grp-results" style="max-height:180px;overflow-y:auto"></div>
    <div class="modal-acts"><button class="btn-c" onclick="closeModal('m-newgroup')">Abbrechen</button><button class="btn-ok" onclick="createGroup()">Erstellen ✓</button></div>
  </div>
</div>

<script>
let sb=null,me=null,myProfile=null,activeConv=null,msgSub=null,allConvs=[],currentTab='chats',grpMembers=[];
const AC=['a1','a2','a3','a4','a5','a6','a7','a8'];
function acol(s){let h=0;for(let c of(s||'x'))h=(h*31+c.charCodeAt(0))%AC.length;return AC[h];}
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function fmtT(ts){return new Date(ts).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
function fmtD(ts){const d=new Date(ts),t=new Date();if(d.toDateString()===t.toDateString())return'Heute';const y=new Date();y.setDate(y.getDate()-1);if(d.toDateString()===y.toDateString())return'Gestern';return d.toLocaleDateString('de-DE');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showS(id){['s-config','s-auth'].forEach(s=>document.getElementById(s).classList.toggle('off',s!==id));}
function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.className='msg-box err';e.style.display='block';}
function showOk(id,msg){const e=document.getElementById(id);e.textContent=msg;e.className='msg-box ok';e.style.display='block';}
function hideM(id){document.getElementById(id).style.display='none';}
function openModal(id){document.getElementById(id).classList.remove('off');}
function closeModal(id){document.getElementById(id).classList.add('off');}

async function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim();
  const key=document.getElementById('cfg-key').value.trim();
  hideM('cfg-err');hideM('cfg-ok');
  if(!url||!key){showErr('cfg-err','Bitte beide Felder ausfüllen!');return;}
  localStorage.setItem('cf_url',url);localStorage.setItem('cf_key',key);
  sb=window.supabase.createClient(url,key);
  showOk('cfg-ok','✅ Gespeichert!');
  setTimeout(()=>showS('s-auth'),700);
}

function switchTab(t){
  document.querySelectorAll('.tabs .tab').forEach((el,i)=>el.classList.toggle('on',i===(t==='login'?0:1)));
  document.getElementById('f-login').style.display=t==='login'?'':'none';
  document.getElementById('f-reg').style.display=t==='register'?'':'none';
  hideM('auth-err');hideM('auth-ok');
}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pw=document.getElementById('l-pw').value;
  hideM('auth-err');
  if(!email||!pw){showErr('auth-err','E-Mail und Passwort eingeben.');return;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){showErr('auth-err','❌ '+error.message);return;}
  await onLogin(data.user);
}
async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pw=document.getElementById('r-pw').value;
  hideM('auth-err');
  if(!name||!email||!pw){showErr('auth-err','Alle Felder ausfüllen.');return;}
  if(pw.length<6){showErr('auth-err','Passwort mind. 6 Zeichen.');return;}
  const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{display_name:name}}});
  if(error){showErr('auth-err','❌ '+error.message);return;}
  if(data.user&&!data.session){showOk('auth-ok','✅ Registriert! Bitte E-Mail bestätigen.');return;}
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,email,display_name:name});
    await onLogin(data.user);
  }
}
async function onLogin(user){
  me=user;
  let{data:prof}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(!prof){
    const name=user.user_metadata?.display_name||user.email.split('@')[0];
    await sb.from('profiles').upsert({id:user.id,email:user.email,display_name:name});
    prof={id:user.id,email:user.email,display_name:name};
  }
  myProfile=prof;
  document.getElementById('s-config').classList.add('off');
  document.getElementById('s-auth').classList.add('off');
  document.getElementById('app').style.display='block';
  const name=prof.display_name||user.email.split('@')[0];
  document.getElementById('my-name').textContent=name;
  document.getElementById('my-email').textContent=user.email;
  const av=document.getElementById('my-av');
  av.textContent=ini(name);av.className='av '+acol(user.id);
  loadConversations();
}
async function doLogout(){
  await sb.auth.signOut();
  me=null;myProfile=null;activeConv=null;allConvs=[];
  if(msgSub){msgSub.unsubscribe();msgSub=null;}
  document.getElementById('app').style.display='none';
  document.getElementById('ca').innerHTML='<div class="empty-ca"><div class="big">💬</div><h2>ChatFlow</h2><p>Tippe auf ✉️ um einen Chat zu starten.</p></div>';
  showS('s-auth');
}

async function loadConversations(){
  const{data:parts}=await sb.from('participants').select('conv_id').eq('user_id',me.id);
  if(!parts||!parts.length){renderConvs([]);return;}
  const ids=parts.map(p=>p.conv_id);
  const{data:convs}=await sb.from('conversations').select('*').in('id',ids).order('updated_at',{ascending:false});
  allConvs=convs||[];
  for(let c of allConvs){
    if(c.type==='private'){
      const{data:others}=await sb.from('participants').select('user_id').eq('conv_id',c.id).neq('user_id',me.id);
      if(others&&others.length>0){
        const{data:prof}=await sb.from('profiles').select('*').eq('id',others[0].user_id).single();
        if(prof){c._other=prof;c._display_name=prof.display_name;c._avatar_id=prof.id;}
      }
    }else{c._display_name=c.name;c._avatar_id=c.id;}
  }
  renderConvs(allConvs);
  sb.channel('conv-watch').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{
    const idx=allConvs.findIndex(c=>c.id===p.new.conv_id);
    if(idx>-1){allConvs[idx].last_msg=p.new.content;allConvs[idx].updated_at=p.new.created_at;allConvs.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));renderConvs(allConvs);}
  }).subscribe();
}
function renderConvs(convs){
  const el=document.getElementById('chat-list');
  const filtered=convs.filter(c=>currentTab==='chats'?c.type==='private':c.type==='group');
  if(!filtered.length){el.innerHTML=`<div class="search-empty">${currentTab==='chats'?'Keine Chats.<br>Starte einen mit ✉️':'Keine Gruppen.<br>Erstelle eine mit 👥'}</div>`;return;}
  el.innerHTML=filtered.map(c=>{
    const active=activeConv?.id===c.id?' on':'';
    const col=acol(c._avatar_id||c.id);
    const cj=JSON.stringify(c).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return`<div class="ci${active}" onclick="openConvById('${c.id}')">
      <div class="av ${col}">${ini(c._display_name||c.name||'?')}</div>
      <div class="ci-info">
        <div class="ci-name">${esc(c._display_name||c.name||'Unbekannt')}</div>
        <div class="ci-prev">${c.last_msg?esc(c.last_msg).slice(0,42):'Noch keine Nachrichten'}</div>
      </div>
      <div class="ci-time">${c.updated_at?fmtD(c.updated_at):''}</div>
    </div>`;
  }).join('');
}
function sbTab(t){currentTab=t;document.querySelectorAll('.sb-tab').forEach((el,i)=>el.classList.toggle('on',i===(t==='chats'?0:1)));renderConvs(allConvs);}
function filterChats(q){renderConvs(allConvs.filter(c=>(c._display_name||c.name||'').toLowerCase().includes(q.toLowerCase())));}

function openConvById(id){const c=allConvs.find(x=>x.id===id);if(c)openConv(c);}
async function openConv(conv){
  activeConv=conv;
  if(msgSub){msgSub.unsubscribe();msgSub=null;}
  renderConvs(allConvs);
  const col=acol(conv._avatar_id||conv.id);
  const dname=conv._display_name||conv.name||'Chat';
  const isGrp=conv.type==='group';
  document.getElementById('ca').innerHTML=`
    <div class="ca-head">
      <div class="av ${col}" style="width:40px;height:40px;font-size:14px;flex-shrink:0">${ini(dname)}</div>
      <div><div class="ct">${esc(dname)}</div><div class="cs" id="ca-sub">${isGrp?'Gruppenchat':'Privater Chat'}</div></div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="inp-bar">
      <textarea id="msg-inp" rows="1" placeholder="Nachricht... (Enter senden, Shift+Enter neue Zeile)" oninput="autoR(this)" onkeydown="hKey(event)"></textarea>
      <button class="send" onclick="sendMsg()">&#10148;</button>
    </div>`;
  await loadMsgs(conv.id);
  subMsgs(conv.id);
  scrollB();
  document.getElementById('msg-inp').focus();
}
async function loadMsgs(cid){
  const{data,error}=await sb.from('messages').select('*').eq('conv_id',cid).order('created_at',{ascending:true}).limit(200);
  if(error){document.getElementById('ca-sub').textContent='Fehler: '+error.message;return;}
  renderMsgs(data||[]);
  document.getElementById('ca-sub').textContent=(data||[]).length+' Nachrichten';
}
function renderMsgs(msgs){
  const w=document.getElementById('msgs');if(!w)return;
  if(!msgs.length){w.innerHTML='<div class="empty-msgs"><div class="bi">👋</div><p>Sag Hallo!</p></div>';return;}
  let lastD='',html='';
  msgs.forEach(m=>{
    const d=fmtD(m.created_at);
    if(d!==lastD){lastD=d;html+=`<div class="date-sep"><span>${d}</span></div>`;}
    const mine=m.sender_id===me?.id;
    const col=acol(m.sender_id||'0');
    html+=`<div class="msg ${mine?'me':'them'}">
      ${!mine?`<div class="msg-av ${col}">${ini(m.sender_name||'?')}</div>`:''}
      <div>
        ${!mine&&activeConv?.type==='group'?`<div class="msg-sender">${esc(m.sender_name||'?')}</div>`:''}
        <div class="bub">${esc(m.content)}</div>
        <div class="msg-time">${fmtT(m.created_at)}</div>
      </div>
    </div>`;
  });
  w.innerHTML=html;
}
function appendMsg(m){
  const w=document.getElementById('msgs');if(!w)return;
  const e=w.querySelector('.empty-msgs');if(e)e.remove();
  const mine=m.sender_id===me?.id;
  const col=acol(m.sender_id||'0');
  const div=document.createElement('div');
  div.className='msg '+(mine?'me':'them');
  div.innerHTML=(!mine?`<div class="msg-av ${col}">${ini(m.sender_name||'?')}</div>`:'')+`<div>${!mine&&activeConv?.type==='group'?`<div class="msg-sender">${esc(m.sender_name||'?')}</div>`:''}<div class="bub">${esc(m.content)}</div><div class="msg-time">${fmtT(m.created_at)}</div></div>`;
  w.appendChild(div);
}
function subMsgs(cid){
  msgSub=sb.channel('msgs-'+cid).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'conv_id=eq.'+cid},p=>{appendMsg(p.new);scrollB();}).subscribe();
}
async function sendMsg(){
  const inp=document.getElementById('msg-inp');if(!inp)return;
  const content=inp.value.trim();if(!content||!activeConv)return;
  inp.value='';autoR(inp);
  const sname=myProfile?.display_name||me.email.split('@')[0];
  const{error}=await sb.from('messages').insert({conv_id:activeConv.id,sender_id:me.id,sender_name:sname,content});
  if(error){inp.value=content;alert('Fehler: '+error.message);return;}
  await sb.from('conversations').update({last_msg:content,updated_at:new Date().toISOString()}).eq('id',activeConv.id).catch(()=>{});
  const idx=allConvs.findIndex(c=>c.id===activeConv.id);if(idx>-1)allConvs[idx].last_msg=content;
  renderConvs(allConvs);
}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function scrollB(){const w=document.getElementById('msgs');if(w)w.scrollTop=w.scrollHeight;}

// SUCHE — lädt ALLE Profile und filtert lokal (kein ilike Problem)
function openNewChat(){
  document.getElementById('search-user').value='';
  document.getElementById('user-results').innerHTML='<div class="search-empty">Tippe einen Namen oder E-Mail ein...</div>';
  openModal('m-newchat');
}
let stimer=null;
function searchUsers(q){
  clearTimeout(stimer);
  const el=document.getElementById('user-results');
  if(!q.trim()){el.innerHTML='<div class="search-empty">Tippe einen Namen oder E-Mail ein...</div>';return;}
  el.innerHTML='<div class="search-empty"><div class="spinner"></div></div>';
  stimer=setTimeout(async()=>{
    const{data,error}=await sb.from('profiles').select('id,display_name,email');
    if(error){
      el.innerHTML='<div class="search-empty" style="color:#ff9090">❌ Fehler: '+error.message+'<br><small>Prüfe RLS Policies auf der profiles Tabelle.</small></div>';
      return;
    }
    const others=(data||[]).filter(u=>u.id!==me.id);
    if(!others.length){
      el.innerHTML='<div class="search-empty">😕 Noch keine anderen Nutzer.<br><small>Dein Freund muss sich zuerst registrieren!</small></div>';
      return;
    }
    const lower=q.toLowerCase();
    const hits=others.filter(u=>(u.display_name||'').toLowerCase().includes(lower)||(u.email||'').toLowerCase().includes(lower));
    if(!hits.length){
      el.innerHTML='<div class="search-empty">Niemanden mit "'+esc(q)+'" gefunden.<br><small>'+others.length+' Nutzer insgesamt vorhanden.</small></div>';
      return;
    }
    el.innerHTML=hits.map(u=>`<div class="user-result" onclick="startPrivateChat('${u.id}','${esc(u.display_name||u.email)}')">
      <div class="av sm ${acol(u.id)}">${ini(u.display_name||u.email)}</div>
      <div><div class="ur-name">${esc(u.display_name||'Unbekannt')}</div><div class="ur-email">${esc(u.email)}</div></div>
      <button class="ur-btn">Chat starten</button>
    </div>`).join('');
  },300);
}
async function startPrivateChat(otherId,otherName){
  closeModal('m-newchat');
  const{data:myP}=await sb.from('participants').select('conv_id').eq('user_id',me.id);
  if(myP&&myP.length>0){
    const myIds=myP.map(p=>p.conv_id);
    const{data:otherP}=await sb.from('participants').select('conv_id').eq('user_id',otherId).in('conv_id',myIds);
    if(otherP&&otherP.length>0){
      const{data:existing}=await sb.from('conversations').select('*').in('id',otherP.map(p=>p.conv_id)).eq('type','private').maybeSingle();
      if(existing){
        existing._display_name=otherName;existing._avatar_id=otherId;
        const idx=allConvs.findIndex(c=>c.id===existing.id);
        if(idx===-1)allConvs.unshift(existing);
        currentTab='chats';
        document.querySelectorAll('.sb-tab').forEach((el,i)=>el.classList.toggle('on',i===0));
        renderConvs(allConvs);openConv(existing);return;
      }
    }
  }
  const{data:conv,error}=await sb.from('conversations').insert({type:'private',updated_at:new Date().toISOString()}).select().single();
  if(error){alert('Fehler beim Erstellen: '+error.message);return;}
  await sb.from('participants').insert([{conv_id:conv.id,user_id:me.id},{conv_id:conv.id,user_id:otherId}]);
  conv._display_name=otherName;conv._avatar_id=otherId;
  allConvs.unshift(conv);
  currentTab='chats';
  document.querySelectorAll('.sb-tab').forEach((el,i)=>el.classList.toggle('on',i===0));
  renderConvs(allConvs);openConv(conv);
}

function openNewGroup(){
  grpMembers=[];
  document.getElementById('grp-name').value='';
  document.getElementById('grp-search').value='';
  document.getElementById('grp-results').innerHTML='';
  document.getElementById('grp-member-chips').innerHTML='';
  openModal('m-newgroup');
}
let gtimer=null;
function searchForGroup(q){
  clearTimeout(gtimer);
  const el=document.getElementById('grp-results');
  if(!q.trim()){el.innerHTML='';return;}
  gtimer=setTimeout(async()=>{
    const{data}=await sb.from('profiles').select('id,display_name,email');
    if(!data||!data.length){el.innerHTML='<div class="search-empty">Keine Nutzer gefunden.</div>';return;}
    const lower=q.toLowerCase();
    const hits=(data||[]).filter(u=>u.id!==me.id&&!grpMembers.find(m=>m.id===u.id)&&((u.display_name||'').toLowerCase().includes(lower)||(u.email||'').toLowerCase().includes(lower)));
    if(!hits.length){el.innerHTML='<div class="search-empty">Niemanden gefunden.</div>';return;}
    el.innerHTML=hits.map(u=>`<div class="user-result" onclick="addToGroup('${u.id}','${esc(u.display_name||u.email)}','${esc(u.email)}')">
      <div class="av sm ${acol(u.id)}">${ini(u.display_name||u.email)}</div>
      <div><div class="ur-name">${esc(u.display_name||'Unbekannt')}</div><div class="ur-email">${esc(u.email)}</div></div>
      <button class="ur-btn">+ Hinzufügen</button>
    </div>`).join('');
  },300);
}
function addToGroup(id,name,email){
  if(grpMembers.find(m=>m.id===id))return;
  grpMembers.push({id,name,email});
  document.getElementById('grp-search').value='';
  document.getElementById('grp-results').innerHTML='';
  renderChips();
}
function removeFromGroup(id){grpMembers=grpMembers.filter(m=>m.id!==id);renderChips();}
function renderChips(){
  document.getElementById('grp-member-chips').innerHTML=grpMembers.map(m=>`<span class="member-chip"><div class="av sm ${acol(m.id)}" style="width:20px;height:20px;font-size:9px">${ini(m.name)}</div>${esc(m.name)}<button onclick="removeFromGroup('${m.id}')">×</button></span>`).join('');
}
async function createGroup(){
  const name=document.getElementById('grp-name').value.trim();
  if(!name){alert('Bitte Gruppenname eingeben!');return;}
  if(!grpMembers.length){alert('Bitte mind. eine Person hinzufügen!');return;}
  const{data:conv,error}=await sb.from('conversations').insert({type:'group',name,updated_at:new Date().toISOString()}).select().single();
  if(error){alert('Fehler: '+error.message);return;}
  await sb.from('participants').insert([{conv_id:conv.id,user_id:me.id},...grpMembers.map(m=>({conv_id:conv.id,user_id:m.id}))]);
  conv._display_name=name;conv._avatar_id=conv.id;
  allConvs.unshift(conv);
  closeModal('m-newgroup');
  currentTab='groups';
  document.querySelectorAll('.sb-tab').forEach((el,i)=>el.classList.toggle('on',i===1));
  renderConvs(allConvs);openConv(conv);
}

(async function(){
  const u=localStorage.getItem('cf_url'),k=localStorage.getItem('cf_key');
  if(u&&k){
    document.getElementById('cfg-url').value=u;
    document.getElementById('cfg-key').value=k;
    sb=window.supabase.createClient(u,k);
    try{
      const{data}=await sb.auth.getSession();
      if(data?.session?.user){await onLogin(data.session.user);return;}
    }catch(e){}
    showS('s-auth');
  }else{showS('s-config');}
})();
