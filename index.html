<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivateChat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:Arial;background:#0f0f13;color:white;display:flex;height:100vh}
.sidebar{width:300px;background:#1a1a22;display:flex;flex-direction:column}
.chatlist{flex:1;overflow:auto}
.chatitem{padding:12px;border-bottom:1px solid #222;cursor:pointer}
.chatitem:hover{background:#222}
.chat{flex:1;display:flex;flex-direction:column}
.messages{flex:1;overflow:auto;padding:15px}
.msg{margin-bottom:10px}
.me{text-align:right}
input,button{padding:8px}
.topbar{padding:10px;background:#1a1a22;display:flex;justify-content:space-between}
.callOverlay{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
video{width:300px;margin:10px}
</style>
</head>
<body>

<div class="sidebar">
  <div style="padding:10px">
    <button onclick="newChat()">Neuer Chat</button>
  </div>
  <div class="chatlist" id="chatlist"></div>
</div>

<div class="chat">
  <div class="topbar">
    <span id="chatTitle">Kein Chat</span>
    <button onclick="startCall()">📞</button>
  </div>
  <div class="messages" id="messages"></div>
  <div style="display:flex">
    <input id="msgInput" style="flex:1" onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">Senden</button>
  </div>
</div>

<div class="callOverlay" id="callOverlay">
  <h2>Call läuft...</h2>
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay muted playsinline></video>
  <button onclick="endCall()">Beenden</button>
</div>

<script>
let sb;
let user;
let currentChat=null;
let msgSub=null;
let callChannel=null;
let pc=null;
let localStream=null;

const rtcConfig={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};

async function init(){
const url=prompt("Supabase URL");
const key=prompt("Anon Key");
sb=supabase.createClient(url,key);
const email=prompt("Email");
const pw=prompt("Passwort");

let {data,error}=await sb.auth.signInWithPassword({email,password:pw});
if(error){
  ({data,error}=await sb.auth.signUp({email,password:pw}));
}
user=data.user;

await sb.from("profiles").upsert({
  id:user.id,
  email:user.email,
  display_name:user.email.split("@")[0]
});

loadChats();
}

async function loadChats(){
const {data}=await sb.from("chats")
.select("*")
.or(`user1.eq.${user.id},user2.eq.${user.id}`);
document.getElementById("chatlist").innerHTML="";
data.forEach(c=>{
let other=c.user1===user.id?c.user2:c.user1;
let div=document.createElement("div");
div.className="chatitem";
div.innerText="Chat "+other;
div.onclick=()=>openChat(c);
document.getElementById("chatlist").appendChild(div);
});
}

async function newChat(){
let other=prompt("User ID des anderen:");
const {data}=await sb.from("chats").insert({
user1:user.id,
user2:other
}).select().single();
loadChats();
openChat(data);
}

async function openChat(chat){
currentChat=chat;
document.getElementById("chatTitle").innerText="Chat geöffnet";
loadMessages();
if(msgSub)msgSub.unsubscribe();
msgSub=sb.channel("room-"+chat.id)
.on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:`chat_id=eq.${chat.id}`},
payload=>appendMsg(payload.new))
.subscribe();
}

async function loadMessages(){
const {data}=await sb.from("messages")
.select("*")
.eq("chat_id",currentChat.id)
.order("created_at",{ascending:true});
document.getElementById("messages").innerHTML="";
data.forEach(m=>appendMsg(m));
}

function appendMsg(m){
let div=document.createElement("div");
div.className="msg "+(m.sender_id===user.id?"me":"");
div.innerText=m.content;
document.getElementById("messages").appendChild(div);
}

async function sendMsg(){
let val=document.getElementById("msgInput").value;
if(!val)return;
document.getElementById("msgInput").value="";
await sb.from("messages").insert({
chat_id:currentChat.id,
sender_id:user.id,
content:val
});
}

async function startCall(){
if(!currentChat)return;
document.getElementById("callOverlay").style.display="flex";
localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("localVideo").srcObject=localStream;
pc=new RTCPeerConnection(rtcConfig);
localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
pc.ontrack=e=>{
document.getElementById("remoteVideo").srcObject=e.streams[0];
};
callChannel=sb.channel("call-"+currentChat.id)
.on("broadcast",{event:"offer"},async({payload})=>{
await pc.setRemoteDescription(new RTCSessionDescription(payload));
let answer=await pc.createAnswer();
await pc.setLocalDescription(answer);
callChannel.send({type:"broadcast",event:"answer",payload:answer});
})
.on("broadcast",{event:"answer"},async({payload})=>{
await pc.setRemoteDescription(new RTCSessionDescription(payload));
})
.on("broadcast",{event:"ice"},async({payload})=>{
await pc.addIceCandidate(new RTCIceCandidate(payload));
})
.subscribe();

pc.onicecandidate=e=>{
if(e.candidate){
callChannel.send({type:"broadcast",event:"ice",payload:e.candidate});
}
};

let offer=await pc.createOffer();
await pc.setLocalDescription(offer);
callChannel.send({type:"broadcast",event:"offer",payload:offer});
}

function endCall(){
if(pc)pc.close();
if(localStream)localStream.getTracks().forEach(t=>t.stop());
if(callChannel)callChannel.unsubscribe();
document.getElementById("callOverlay").style.display="none";
}

init();
</script>
</body>
</html>
